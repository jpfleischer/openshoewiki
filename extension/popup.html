<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenShoeWiki Extractor</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="app">
    <header class="hero">
      <p class="eyebrow">OpenShoeWiki</p>
      <h1>Page Extractor</h1>
      <p class="lede">Pull the current product page into a compact evidence payload and ask your Ollama host for shoe fields.</p>
    </header>

    <section class="panel">
      <h2>Connection</h2>
      <label class="field">
        <span>Base URL</span>
        <input id="baseUrl" type="url" placeholder="http://your-ollama-host:11434">
      </label>
      <label class="field">
        <span>Username</span>
        <input id="username" type="text" placeholder="Username">
      </label>
      <label class="field">
        <span>Password</span>
        <input id="password" type="password" placeholder="Basic auth password">
      </label>
      <label class="field">
        <span>Model</span>
        <input id="model" type="text" placeholder="gemma3:27b">
      </label>
      <div class="actions">
        <button id="saveSettings" type="button" class="secondary">Save Settings</button>
      </div>
      <p id="settingsStatus" class="status"></p>
    </section>

    <section class="panel">
      <h2>Extraction</h2>
      <p class="lede">The extension uses a built-in structured shoe extraction prompt. Only the connection settings and model are configurable.</p>
      <div class="actions">
        <button id="analyzePage" type="button" class="primary">Analyze Current Page</button>
      </div>
      <p id="runStatus" class="status"></p>
    </section>

    <section class="panel">
      <h2>Result</h2>
      <textarea id="result" rows="16" readonly placeholder="The model response will appear here."></textarea>
    </section>
  </main>
  <script src="popup.js"></script>
</body>
</html>
